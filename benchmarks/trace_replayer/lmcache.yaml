# Example LMCache configuration for trace replayer benchmark
# This file should be used with LMCACHE_CONFIG_FILE environment variable

chunk_size: 256
local_device: "cuda"
local_device_index: 0

# Redis backend for caching
backend: 
  type: "redis"
  config:
    host: "localhost"
    port: 6379
    db: 0

# Prefixes for cache keys
cache_key:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  prefix: "lmcache:benchmark"

# Cache blending configuration (if using blend mode)
cache_blending:
  enabled: true
  blend_length: 16
  rerank_factor: 0.1
